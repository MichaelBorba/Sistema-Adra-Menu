<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portal ADRA - Bom Jesus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --verde: #007d5c; --bg: #f0f4f3; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .menu-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .menu-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 6px 6px 12px #d1d9d7, -2px -2px 8px #ffffff;
            transition: transform 0.2s, border-color 0.2s;
            border: 2px solid transparent;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .menu-card:active {
            transform: scale(0.97);
            border-color: var(--verde);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: #e6f2ef;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--verde);
            font-size: 24px;
            flex-shrink: 0;
        }

        .text-box h3 { font-weight: 800; color: #1a3a32; text-transform: uppercase; font-size: 14px; margin-bottom: 2px; }
        .text-box p { font-size: 11px; color: #666; line-height: 1.3; }

        header { text-align: center; padding: 30px 0; }
        header img { max-width: 140px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="menu-container">
    <header>
        <img src="https://static.wixstatic.com/media/2956c5_44bf991606b14fdd84cfcedcc8a19d83~mv2.png/v1/fill/w_1120,h_760,al_c/adra.png" alt="Logo ADRA">
        <h1 class="text-[#007d5c] font-black uppercase tracking-tighter text-xl">Sistema Integrado</h1>
        <p class="text-gray-400 text-[10px] font-bold uppercase">Abrigo Bom Jesus</p>
    </header>

    <div class="flex-1">
        <a href="plantao.html" class="menu-card">
            <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
            <div class="text-box">
                <h3>Abertura de Plantão</h3>
                <p>Controle de equipe, turnos e registro de ocorrências diárias.</p>
            </div>
        </a>

        <div class="menu-card opacity-50">
            <div class="icon-box"><i class="fas fa-users"></i></div>
            <div class="text-box">
                <h3>Gerenciar Acolhidos</h3>
                <p>Cadastro e movimentação de residentes (Em breve).</p>
            </div>
        </div>

        <div class="menu-card opacity-50">
            <div class="icon-box"><i class="fas fa-tools"></i></div>
            <div class="text-box">
                <h3>Oficinas</h3>
                <p>Controle de atividades e workshops (Em breve).</p>
            </div>
        </div>
    </div>

    <footer class="text-center py-6">
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">ADRA Brasil © 2026</p>
    </footer>
</div>

</body>
</html>
