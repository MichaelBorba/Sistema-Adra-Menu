<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADRA - Abrigo Bom Jesus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --verde: #007d5c; --verde-claro: #9cd1bc; }
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .bg-abrigo { background-color: var(--verde); }
        .btn-acao { background-color: var(--verde-claro); border-radius: 50px; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 0px #7ab59e; color: white; }
        .btn-acao:active { transform: translateY(2px); box-shadow: 0 2px 0px #7ab59e; }
        .tela { display: none; }
        .tela-ativa { display: block; }
        
        #modal-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="max-w-[500px] mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
    
    <header class="bg-abrigo p-6 rounded-b-[40px] shadow-lg text-center z-10">
        <img src="https://static.wixstatic.com/media/2956c5_44bf991606b14fdd84cfcedcc8a19d83~mv2.png/v1/fill/w_1120,h_760,al_c/adra.png" 
             alt="Logo ADRA" class="h-20 mx-auto mb-2 object-contain bg-white rounded-lg p-1">
        <h1 class="text-white text-xl font-bold uppercase tracking-tighter">Abrigo Bom Jesus</h1>
        
        <div id="user-tag" class="hidden mt-2 inline-block bg-black/20 px-4 py-1 rounded-full text-xs text-white border border-white/20">
            👤 Operador: <span id="nome-operador" class="font-bold">---</span>
        </div>
    </header>

    <div id="modal-login">
        <div class="bg-white w-[85%] max-w-[350px] p-8 rounded-[40px] shadow-2xl border-t-8 border-[#007d5c]">
            <h3 class="text-2xl font-bold text-[#007d5c] mb-2 text-center">Acesso Restrito</h3>
            <p class="text-gray-400 text-sm text-center mb-6">Use as credenciais de teste</p>
            <div class="space-y-4">
                <input type="text" id="input-usuario" placeholder="Usuário" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#007d5c]">
                <input type="password" id="input-senha" placeholder="Senha" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#007d5c]">
                <button onclick="realizarLogin()" class="w-full bg-[#007d5c] text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-800 transition-colors">LOGAR NO SISTEMA</button>
            </div>
            <p class="text-[10px] text-gray-400 mt-4 text-center italic">Dica: Mic@ / 1</p>
        </div>
    </div>

    <main class="flex-1 p-8 flex flex-col justify-center gap-6">

        <div id="tela-1" class="tela space-y-10 text-center">
            <button onclick="mudarTela(2)" class="btn-acao w-full py-6 text-xl uppercase shadow-xl">Abertura de Plantão</button>
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <p class="text-blue-800 text-sm font-medium">Bem-vindo ao sistema de controle diário do Abrigo Bom Jesus.</p>
            </div>
        </div>

        <div id="tela-2" class="tela space-y-6 text-center">
            <h3 class="text-emerald-700 font-bold mb-4 uppercase tracking-widest">Selecione o Turno</h3>
            <button onclick="setTurno('Diurno')" class="btn-acao w-full py-5 text-lg">DIURNO (07h - 19h)</button>
            <button onclick="setTurno('Noturno')" class="btn-acao w-full py-5 text-lg">NOTURNO (19h - 07h)</button>
            <button onclick="mudarTela(1)" class="text-gray-400 font-bold block mt-6">« Voltar ao Início</button>
        </div>

        <div id="tela-3" class="tela space-y-6 text-center">
            <h3 class="text-emerald-700 font-bold mb-4 uppercase tracking-widest">Unidade de Plantão</h3>
            <button onclick="setPosto('Plantão 1')" class="btn-acao w-full py-5 text-lg">PLANTÃO 1</button>
            <button onclick="setPosto('Plantão 2')" class="btn-acao w-full py-5 text-lg">PLANTÃO 2</button>
            <button onclick="mudarTela(2)" class="text-gray-400 font-bold block mt-6">« Voltar ao Turno</button>
        </div>

        <div id="tela-4" class="tela">
            <div class="bg-[#007d5c] p-6 rounded-[35px] shadow-2xl">
                <p class="text-white font-bold border-b border-white/20 pb-3 mb-4 uppercase text-center text-xs tracking-widest">Chamada de Equipe</p>
                <div id="lista-corpo" class="space-y-4 max-h-[300px] overflow-y-auto pr-2"></div>
            </div>
            <button onclick="mudarTela(5)" class="btn-acao w-full py-4 mt-8 uppercase tracking-widest">Confirmar Presenças</button>
        </div>

        <div id="tela-5" class="tela space-y-4">
            <h3 class="text-emerald-800 font-bold text-center">RELATÓRIO DE OCORRÊNCIAS</h3>
            <textarea id="texto-obs" class="w-full h-48 p-5 border-2 border-emerald-100 rounded-[35px] outline-none focus:border-[#007d5c] text-gray-700 shadow-inner" placeholder="Relate aqui as novidades, trocas de plantão ou intercorrências..."></textarea>
            <button onclick="gerarRelatorio()" class="btn-acao w-full py-5 text-lg uppercase shadow-lg">Encerrar e Gerar PDF</button>
        </div>

    </main>

    <footer class="p-6 flex justify-between items-center bg-gray-50 border-t border-gray-100">
        <button onclick="window.location.href='index.html'" class="bg-red-50 px-4 py-2 rounded-xl text-red-600 font-bold text-xs uppercase">Sair</button>
        
        <button onclick="mudarTela(1)" class="bg-indigo-600 p-4 rounded-full text-white shadow-2xl hover:scale-105 transition-transform">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </button>
    </footer>
</div>

<script>
    const USUARIO_TESTE = "Mic@";
    const SENHA_TESTE = "1";
    let usuarioLogado = "";
    let plantao = { turno: '', posto: '', equipe: [] };

    function realizarLogin() {
        const user = document.getElementById('input-usuario').value;
        const pass = document.getElementById('input-senha').value;
        if(user === USUARIO_TESTE && pass === SENHA_TESTE) {
            usuarioLogado = user;
            document.getElementById('nome-operador').innerText = usuarioLogado;
            document.getElementById('user-tag').classList.remove('hidden');
            document.getElementById('modal-login').style.display = 'none';
            mudarTela(1);
        } else { alert("❌ Usuário ou senha inválidos!"); }
    }

    function mudarTela(n) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('tela-ativa'));
        const target = document.getElementById('tela-' + n);
        if(target) target.classList.add('tela-ativa');
    }

    function setTurno(t) { plantao.turno = t; mudarTela(3); }
    function setPosto(p) { plantao.posto = p; gerarEquipe(); mudarTela(4); }

    function gerarEquipe() {
        const nomes = ["Ricardo Oliveira", "Bruna Silva", "Marcos Souza", "Ana Maria", "Sérgio Mendes", "Luciana Costa"];
        plantao.equipe = nomes.map(n => ({ nome: n, status: 'Presente' }));
        const corpo = document.getElementById('lista-corpo');
        corpo.innerHTML = plantao.equipe.map((func, i) => `
            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl hover:bg-white/10 transition-colors">
                <span class="text-white font-medium">${func.nome}</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" checked onchange="plantao.equipe[${i}].status = this.checked ? 'Presente' : 'Faltou'" class="sr-only peer">
                    <div class="w-11 h-6 bg-red-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>
        `).join('');
    }

    function gerarRelatorio() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const obs = document.getElementById('texto-obs').value;
        const dataH = new Date().toLocaleString();
        doc.setFillColor(0, 125, 92);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("FECHAMENTO DE PLANTÃO - ADRA", 20, 25);
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10);
        doc.text(`Gerado em: ${dataH}`, 20, 50);
        doc.text(`RESPONSÁVEL: ${usuarioLogado}`, 20, 60);
        doc.text(`TURNO: ${plantao.turno} | POSTO: ${plantao.posto}`, 20, 70);
        doc.setFont("helvetica", "bold");
        doc.text("STATUS DA EQUIPE:", 20, 85);
        doc.setFont("helvetica", "normal");
        plantao.equipe.forEach((f, i) => {
            const cor = f.status === 'Presente' ? "[P]" : "[F]";
            doc.text(`${cor} ${f.nome}`, 25, 95 + (i * 8));
        });
        doc.setFont("helvetica", "bold");
        doc.text("OCORRÊNCIAS REGISTRADAS:", 20, 160);
        doc.setFont("helvetica", "normal");
        const splitObs = doc.splitTextToSize(obs || "Sem ocorrências registradas no período.", 170);
        doc.text(splitObs, 20, 170);
        doc.save(`Plantao_${plantao.posto}_${usuarioLogado}.pdf`);
        alert("✅ Relatório gerado com sucesso!");
    }
</script>
</body>
</html>
